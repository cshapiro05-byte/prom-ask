<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prom Ask - Gigi 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #764ba2;
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .heart {
            font-size: 3em;
            margin: 20px 0;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        p {
            color: #555;
            font-size: 1.2em;
            margin: 20px 0;
            line-height: 1.6;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .no-btn {
            background: #ff6b9d;
            color: white;
            position: relative;
        }

        .no-btn:hover {
            transform: translate(50px, -50px);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: fall 2s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .celebration {
            display: none;
            font-size: 3em;
            animation: celebration 2s ease-out;
        }

        @keyframes celebration {
            0% {
                transform: scale(0) rotate(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
            }
            100% {
                transform: scale(1) translateY(-50px);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            font-size: 1.5em;
            animation: sparkleAnim 1s ease-out forwards;
        }

        @keyframes sparkleAnim {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0) translateY(-50px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Will you go to prom with me? ✨</h1>
        <div class="heart">💕</div>
        <p>Hi Gigi!</p>
        <p>You're amazing and I'd love to go to prom with you.</p>
        <p>What do you say?</p>
        
        <div class="button-container">
            <button class="yes-btn" onclick="handleYes()">YES! 🎉</button>
            <button class="no-btn" onclick="handleNo()">No</button>
        </div>
    </div>

    <script>
        function handleYes() {
            // Create confetti
            for (let i = 0; i < 50; i++) {
                createConfetti();
            }
            
            // Show celebration message
            const container = document.querySelector('.container');
            const celebration = document.createElement('div');
            celebration.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 4em;
                animation: celebration 2s ease-out;
                pointer-events: none;
                z-index: 1000;
            `;
            celebration.textContent = '🎊';
            document.body.appendChild(celebration);

            // Alert message
            setTimeout(() => {
                alert('🎉 Yay! This is going to be amazing! Can\'t wait to see you at prom, Gigi! 💕');
            }, 500);
        }

        function handleNo() {
            const noBtn = document.querySelector('.no-btn');
            
            // Random position
            const randomX = Math.random() * 300 - 150;
            const randomY = Math.random() * 300 - 150;
            
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.textContent = ['🎉', '💕', '✨', '🎊', '💖'][Math.floor(Math.random() * 5)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 2000);
        }

        // Make no button run away on hover
        document.querySelector('.no-btn').addEventListener('mouseover', function() {
            const randomX = Math.random() * 300 - 150;
            const randomY = Math.random() * 300 - 150;
            this.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });
    </script>
</body>
</html>
